sonar.organization=minixrs
sonar.projectKey=minixrs_minixrs

sonar.sources=.
sonar.exclusions=target/**,external/**,**/*.S,**/*.ld

# Coverage produced by `cargo llvm-cov --lcov` in the coverage CI job.
sonar.rust.lcov.reportPaths=lcov.info

# Coverage exclusions: IPC glue that traps into the kernel cannot execute under
# a host `cargo test` — it is verified instead by the QEMU boot trace
# (kernel-side `[ipc]`/`[ksys]`/`[pf]` lines), the same integration-only path
# that already excludes `**/*.S` from analysis. Three kinds:
#   * `servers/**/src/main.rs`, `drivers/**/src/main.rs` — freestanding entry
#     points: a RECEIVE loop dispatching to handlers that SEND/SENDREC via SVC.
#   * `minix-ipc/src/**` — the syscall trap library itself (SVC/SYSCALL asm
#     stubs); every function either is inline asm or an off-target `unreachable!`
#     fallback, so nothing here is host-executable.
#   * `server-rt/src/sef.rs` — the SEF startup handshake + receive loop, and
#     `server-rt/src/ds.rs` — the `sef_publish_to_ds` helper, both of which
#     SENDREC/RECEIVE/NOTIFY via `minix-ipc`.
# Testable logic stays in measured submodules — e.g. `servers/vm/src/region.rs`,
# `servers/ds/src/registry.rs` (the DS name→endpoint store), and
# `server-rt/src/classify.rs` (the pure SEF message classifier), which carry the
# host unit tests.
sonar.coverage.exclusions=servers/**/src/main.rs,drivers/**/src/main.rs,minix-ipc/src/**,server-rt/src/sef.rs,server-rt/src/ds.rs
