sonar.organization=minixrs
sonar.projectKey=minixrs_minixrs

sonar.sources=.
sonar.exclusions=target/**,external/**,**/*.S,**/*.ld

# Coverage produced by `cargo llvm-cov --lcov` in the coverage CI job.
sonar.rust.lcov.reportPaths=lcov.info

# Coverage exclusions: freestanding user-space server/driver entry points are
# IPC glue (a RECEIVE loop dispatching to handlers that SEND/SENDREC via SVC).
# Those syscalls trap into the kernel, so the handlers cannot execute under a
# host `cargo test` — they are verified instead by the QEMU boot trace
# (kernel-side `[ipc]`/`[ksys]`/`[pf]` lines), the same integration-only path
# that already excludes `**/*.S` from analysis. Testable logic lives in
# submodules (e.g. `servers/vm/src/region.rs`), which stay measured.
sonar.coverage.exclusions=servers/**/src/main.rs,drivers/**/src/main.rs
